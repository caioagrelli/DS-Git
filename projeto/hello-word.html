<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogo da Forca</title>
<link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root[data-theme="dark"] {
    --bg: #0f0f1a;
    --grad1: rgba(120, 40, 200, .15);
    --grad2: rgba(0, 180, 220, .1);
    --text: #e0e0f0;
    --hint-bg: rgba(255,255,255,.06);
    --hint-border: rgba(255,255,255,.1);
    --hint-text: #aab;
    --base-stroke: #556;
    --slot-border: rgba(255,255,255,.25);
    --slot-text: #fff;
    --key-bg: rgba(255,255,255,.08);
    --key-hover: rgba(255,255,255,.18);
    --key-text: #e0e0f0;
    --overlay-bg: rgba(0,0,0,.75);
    --box-bg: #1a1a2e;
    --box-border: rgba(255,255,255,.1);
    --err-text: #888;
  }
  :root[data-theme="light"] {
    --bg: #f0f0f5;
    --grad1: rgba(120, 40, 200, .06);
    --grad2: rgba(0, 180, 220, .06);
    --text: #222;
    --hint-bg: rgba(0,0,0,.05);
    --hint-border: rgba(0,0,0,.1);
    --hint-text: #555;
    --base-stroke: #999;
    --slot-border: rgba(0,0,0,.25);
    --slot-text: #111;
    --key-bg: rgba(0,0,0,.07);
    --key-hover: rgba(0,0,0,.14);
    --key-text: #222;
    --overlay-bg: rgba(255,255,255,.75);
    --box-bg: #fff;
    --box-border: rgba(0,0,0,.1);
    --err-text: #666;
  }

  body {
    min-height: 100vh;
    background: var(--bg);
    background-image:
      radial-gradient(ellipse at 20% 50%, var(--grad1) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 30%, var(--grad2) 0%, transparent 50%);
    font-family: 'Quicksand', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text);
    padding: 20px;
    transition: background .4s, color .4s;
  }

  .theme-toggle {
    position: fixed; top: 16px; right: 16px;
    width: 48px; height: 48px; border: none; border-radius: 50%;
    background: var(--key-bg); color: var(--text); font-size: 1.4rem;
    cursor: pointer; transition: background .3s, transform .2s; z-index: 20;
  }
  .theme-toggle:hover { background: var(--key-hover); transform: scale(1.1); }

  h1 {
    font-family: 'Permanent Marker', cursive;
    font-size: clamp(2rem, 5vw, 3.2rem);
    background: linear-gradient(135deg, #f39c12, #e74c3c, #9b59b6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
    letter-spacing: 2px;
  }

  .hint {
    background: var(--hint-bg);
    border: 1px solid var(--hint-border);
    border-radius: 12px;
    padding: 10px 24px;
    margin-bottom: 24px;
    font-size: .95rem;
    color: var(--hint-text);
  }
  .hint strong { color: #f1c40f; }

  .game-area {
    display: flex; flex-wrap: wrap; gap: 40px;
    align-items: center; justify-content: center; margin-bottom: 30px;
  }

  svg.hangman { width: 180px; height: 220px; filter: drop-shadow(0 0 12px rgba(231, 76, 60, .3)); }
  svg.hangman line, svg.hangman circle, svg.hangman path {
    stroke: #e74c3c; stroke-width: 3; stroke-linecap: round; fill: none; opacity: 0; transition: opacity .4s;
  }
  svg.hangman .base { stroke: var(--base-stroke); opacity: 1; }
  svg.hangman .show { opacity: 1; }

  .phrase { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; max-width: 500px; }
  .word { display: flex; gap: 5px; margin: 0 8px; }
  .letter-slot {
    width: 36px; height: 44px;
    border-bottom: 3px solid var(--slot-border);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Permanent Marker', cursive; font-size: 1.6rem;
    color: var(--slot-text); text-transform: uppercase;
    transition: border-color .3s, transform .3s;
  }
  .letter-slot.revealed { border-color: #2ecc71; animation: pop .35s ease; }
  @keyframes pop { 0%{transform:scale(1)} 50%{transform:scale(1.3)} 100%{transform:scale(1)} }

  .keyboard { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; max-width: 560px; margin-bottom: 24px; }
  .key {
    width: 42px; height: 46px; border: none; border-radius: 8px;
    background: var(--key-bg); color: var(--key-text);
    font-family: 'Quicksand', sans-serif; font-weight: 700; font-size: 1.05rem;
    cursor: pointer; transition: background .2s, transform .15s, opacity .3s; text-transform: uppercase;
  }
  .key:hover:not(:disabled) { background: var(--key-hover); transform: translateY(-2px); }
  .key:disabled { opacity: .2; cursor: default; }
  .key.correct { background: rgba(46,204,113,.3); color: #2ecc71; }
  .key.wrong   { background: rgba(231,76,60,.25); color: #e74c3c; }

  .overlay { position: fixed; inset: 0; background: var(--overlay-bg); display: none; align-items: center; justify-content: center; z-index: 10; backdrop-filter: blur(6px); }
  .overlay.show { display: flex; }
  .overlay-box { text-align: center; padding: 40px 50px; border-radius: 20px; background: var(--box-bg); border: 1px solid var(--box-border); }
  .overlay-box h2 { font-family: 'Permanent Marker', cursive; font-size: 2.2rem; margin-bottom: 12px; }
  .overlay-box p { margin-bottom: 20px; color: var(--hint-text); }
  .btn-restart { padding: 12px 36px; border: none; border-radius: 10px; background: linear-gradient(135deg, #9b59b6, #e74c3c); color: #fff; font-family: 'Quicksand', sans-serif; font-weight: 700; font-size: 1rem; cursor: pointer; transition: transform .2s; }
  .btn-restart:hover { transform: scale(1.06); }

  .errors-count { font-size: .85rem; color: var(--err-text); margin-bottom: 10px; }

  .footer {
    margin-top: 30px;
    font-size: .85rem;
    color: var(--hint-text);
    text-align: center;
  }
  .footer a {
    color: #9b59b6;
    text-decoration: none;
    font-weight: 700;
    transition: color .2s;
  }
  .footer a:hover { color: #e74c3c; }
  .footer strong { color: var(--text); }
</style>
</head>
<body>

<button class="theme-toggle" onclick="toggleTheme()" title="Mudar tema">🌙</button>

<h1>Jogo da Forca</h1>
<div class="hint">Dica: <strong>Melhores professores de DS</strong></div>

<div class="game-area">
  <svg class="hangman" viewBox="0 0 150 200">
    <!-- base -->
    <line class="base" x1="10" y1="190" x2="140" y2="190"/>
    <line class="base" x1="40" y1="190" x2="40" y2="20"/>
    <line class="base" x1="40" y1="20" x2="100" y2="20"/>
    <line class="base" x1="100" y1="20" x2="100" y2="40"/>
    <!-- parts -->
    <circle id="p1" cx="100" cy="55" r="15"/>
    <line   id="p2" x1="100" y1="70" x2="100" y2="120"/>
    <line   id="p3" x1="100" y1="85" x2="75"  y2="105"/>
    <line   id="p4" x1="100" y1="85" x2="125" y2="105"/>
    <line   id="p5" x1="100" y1="120" x2="78" y2="155"/>
    <line   id="p6" x1="100" y1="120" x2="122" y2="155"/>
  </svg>

  <div class="phrase" id="phrase"></div>
</div>

<p class="errors-count">Erros: <span id="errCount">0</span> / 6</p>
<div class="keyboard" id="keyboard"></div>

<div class="footer">
  Desenvolvido por <a href="https://github.com/caioagrelli" target="_blank">Caio Agrelli</a> 🚀<br>
  Disciplina de Desenvolvimento de Software — 2025<br>
  Professores: <strong>Kiev Gama</strong> & <strong>Vinicius Cardoso</strong>
</div>

<div class="overlay" id="overlay">
  <div class="overlay-box">
    <h2 id="endTitle"></h2>
    <p id="endMsg"></p>
    <button class="btn-restart" onclick="init()">Jogar de novo</button>
  </div>
</div>

<script>
const PHRASE = "vinicius e kiev";
const MAX = 6;
let guessed, errors;

function toggleTheme() {
  const html = document.documentElement;
  const btn = document.querySelector('.theme-toggle');
  if (html.dataset.theme === 'dark') {
    html.dataset.theme = 'light';
    btn.textContent = '☀️';
  } else {
    html.dataset.theme = 'dark';
    btn.textContent = '🌙';
  }
}

function init() {
  guessed = new Set();
  errors = 0;
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('errCount').textContent = '0';
  renderPhrase();
  renderKeyboard();
  for (let i = 1; i <= 6; i++) document.getElementById('p'+i).classList.remove('show');
}

function renderPhrase() {
  const el = document.getElementById('phrase');
  el.innerHTML = '';
  PHRASE.split(' ').forEach(w => {
    const wd = document.createElement('div');
    wd.className = 'word';
    [...w].forEach(ch => {
      const s = document.createElement('div');
      s.className = 'letter-slot';
      if (guessed.has(ch)) { s.textContent = ch; s.classList.add('revealed'); }
      wd.appendChild(s);
    });
    el.appendChild(wd);
  });
}

function renderKeyboard() {
  const el = document.getElementById('keyboard');
  el.innerHTML = '';
  'abcdefghijklmnopqrstuvwxyz'.split('').forEach(ch => {
    const b = document.createElement('button');
    b.className = 'key';
    b.textContent = ch;
    if (guessed.has(ch)) {
      b.disabled = true;
      b.classList.add(PHRASE.includes(ch) ? 'correct' : 'wrong');
    }
    b.onclick = () => guess(ch);
    el.appendChild(b);
  });
}

function guess(ch) {
  if (guessed.has(ch)) return;
  guessed.add(ch);
  if (!PHRASE.replace(/ /g,'').includes(ch)) {
    errors++;
    document.getElementById('p'+errors).classList.add('show');
    document.getElementById('errCount').textContent = errors;
  }
  renderPhrase();
  renderKeyboard();
  checkEnd();
}

function checkEnd() {
  const letters = new Set(PHRASE.replace(/ /g,''));
  const won = [...letters].every(l => guessed.has(l));
  if (won) return endGame(true);
  if (errors >= MAX) return endGame(false);
}

function endGame(won) {
  const ov = document.getElementById('overlay');
  document.getElementById('endTitle').textContent = won ? '🎉 Parabéns!' : '💀 Você perdeu!';
  document.getElementById('endTitle').style.color = won ? '#2ecc71' : '#e74c3c';
  document.getElementById('endMsg').textContent = won
    ? 'Você acertou: "VINICIUS E KIEV"!'
    : 'A resposta era: "VINICIUS E KIEV"';
  ov.classList.add('show');
}

document.addEventListener('keydown', e => {
  const ch = e.key.toLowerCase();
  if (/^[a-z]$/.test(ch)) guess(ch);
});

init();
</script>
</body>
</html>
